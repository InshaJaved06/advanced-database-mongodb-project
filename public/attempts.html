<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QuizArena — My Attempts</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #fdf6f0; --pink: #f7c5d5; --pink-deep: #e8789a; --pink-text: #8b3a5a;
    --yellow: #fde99d; --yellow-deep: #f5c842; --yellow-text: #7a5c00;
    --blue: #c2dff6; --blue-deep: #6aaee8; --blue-text: #1a4f7a;
    --card: #fffbf8; --border: rgba(0,0,0,0.07); --text: #2c1f2e; --muted: #9b8fa0;
    --sidebar-w: 240px; --success: #5abf9a; --error: #e05c7a;
  }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }

  .blob { position: fixed; border-radius: 50%; z-index: 0; pointer-events: none; filter: blur(70px); animation: drift 14s ease-in-out infinite; }
  .blob-1 { width: 400px; height: 400px; background: var(--pink); opacity: 0.25; top: -150px; right: -100px; }
  .blob-2 { width: 300px; height: 300px; background: var(--yellow); opacity: 0.3; bottom: -80px; left: 260px; animation-delay: -5s; }
  @keyframes drift { 0%,100% { transform: translate(0,0); } 50% { transform: translate(12px,-16px); } }

  .sidebar { width: var(--sidebar-w); background: var(--card); border-right: 1.5px solid var(--border); display: flex; flex-direction: column; padding: 28px 16px; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 36px; padding: 0 8px; }
  .logo-icon { width: 38px; height: 38px; background: var(--pink-deep); border-radius: 11px; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-weight: 800; font-size: 18px; color: #fff; box-shadow: 0 3px 14px rgba(232,120,154,0.35); }
  .logo-text { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 18px; color: var(--pink-text); }
  .nav-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; padding: 0 12px; margin-bottom: 8px; margin-top: 20px; }
  .nav-item { display: flex; align-items: center; gap: 11px; padding: 11px 12px; border-radius: 12px; font-size: 14px; font-weight: 500; color: var(--muted); cursor: pointer; text-decoration: none; transition: background 0.2s, color 0.2s; margin-bottom: 3px; }
  .nav-item:hover { background: var(--pink); color: var(--pink-text); }
  .nav-item.active { background: var(--pink); color: var(--pink-text); font-weight: 600; }
  .nav-item .icon { font-size: 17px; width: 20px; text-align: center; }
  .sidebar-footer { margin-top: auto; padding: 0 8px; }
  .user-card { display: flex; align-items: center; gap: 10px; padding: 12px; background: var(--pink); border-radius: 14px; }
  .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--pink-deep); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: #fff; flex-shrink: 0; }
  .user-name { font-size: 13px; font-weight: 600; color: var(--pink-text); }
  .user-role { font-size: 11px; color: var(--pink-text); opacity: 0.7; }
  .logout-btn { margin-left: auto; background: none; border: none; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--pink-text); opacity: 0.5; transition: opacity 0.2s; }
  .logout-btn:hover { opacity: 1; }

  .main { margin-left: var(--sidebar-w); flex: 1; padding: 36px 40px; position: relative; z-index: 1; animation: fadeIn 0.6s ease both; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .page-title { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 800; color: var(--text); letter-spacing: -0.8px; }
  .page-sub { font-size: 15px; color: var(--muted); margin-top: 6px; margin-bottom: 28px; }

  /* Stats */
  .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 32px; }
  .stat-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 18px; padding: 20px; position: relative; overflow: hidden; transition: transform 0.2s; }
  .stat-card:hover { transform: translateY(-3px); }
  .stat-card::before { content:''; position:absolute; top:-30px; right:-30px; width:90px; height:90px; border-radius:50%; opacity:0.15; }
  .stat-card.pink::before { background: var(--pink-deep); }
  .stat-card.yellow::before { background: var(--yellow-deep); }
  .stat-card.blue::before { background: var(--blue-deep); }
  .stat-card.green::before { background: #7ec87e; }
  .stat-icon { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 10px; }
  .stat-val { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: var(--text); }
  .stat-lbl { font-size: 13px; color: var(--muted); margin-top: 2px; }

  /* Attempts list */
  .section-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 22px; padding: 28px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; }

  .attempts-list { display: flex; flex-direction: column; gap: 12px; }
  .attempt-card { display: flex; align-items: center; gap: 16px; padding: 18px 20px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 16px; transition: border-color 0.2s, transform 0.2s; animation: rowIn 0.4s ease both; }
  .attempt-card:hover { border-color: var(--pink); transform: translateX(3px); }
  @keyframes rowIn { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:translateX(0); } }

  .attempt-result-badge { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; flex-shrink: 0; }
  .badge-pass { background: #d4f5e8; color: #1a6b45; }
  .badge-fail { background: #fde0e0; color: #a03030; }

  .attempt-info { flex: 1; }
  .attempt-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
  .attempt-meta { font-size: 12px; color: var(--muted); display: flex; gap: 12px; flex-wrap: wrap; }
  .meta-item { display: flex; align-items: center; gap: 4px; }

  .attempt-score-wrap { text-align: right; }
  .attempt-score { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; }
  .score-pass { color: var(--success); }
  .score-fail { color: var(--error); }
  .attempt-score-lbl { font-size: 11px; color: var(--muted); }

  .diff-pill { padding: 2px 8px; border-radius: 100px; font-size: 11px; font-weight: 600; }
  .diff-Easy { background: #d4f0e8; color: #2d7a5f; }
  .diff-Medium { background: var(--yellow); color: var(--yellow-text); }
  .diff-Hard { background: #fdd5d5; color: #a03030; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-text { font-size: 16px; margin-bottom: 20px; }
  .btn-browse { padding: 12px 24px; background: var(--pink-deep); color: #fff; border: none; border-radius: 13px; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; box-shadow: 0 3px 14px rgba(232,120,154,0.3); transition: transform 0.2s; }
  .btn-browse:hover { transform: translateY(-2px); }

  @media (max-width: 900px) { .stats-row { grid-template-columns: repeat(2,1fr); } }
  @media (max-width: 650px) { .sidebar { display: none; } .main { margin-left: 0; padding: 24px 16px; } }
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<aside class="sidebar">
  <div class="logo"><div class="logo-icon">Q</div><span class="logo-text">QuizArena</span></div>
  <span class="nav-label">Menu</span>
  <a class="nav-item" href="dashboard.html"><span class="icon">&#8962;</span> Dashboard</a>
  <a class="nav-item" href="quizzes.html"><span class="icon">&#9776;</span> Browse Quizzes</a>
  <a class="nav-item active" href="attempts.html"><span class="icon">&#9998;</span> My Attempts</a>
  <a class="nav-item" href="leaderboard.html"><span class="icon">&#9733;</span> Leaderboard</a>
  <span class="nav-label" id="adminNavLabel" style="display:none">Admin</span>
  <a class="nav-item" id="adminNav" href="admin.html" style="display:none"><span class="icon">&#9881;</span> Manage Quizzes</a>
  <div class="sidebar-footer">
    <div class="user-card">
      <div class="user-avatar" id="sidebarAvatar">?</div>
      <div><div class="user-name" id="sidebarName">Loading...</div><div class="user-role" id="sidebarRole">student</div></div>
      <button class="logout-btn" onclick="logout()">Exit</button>
    </div>
  </div>
</aside>

<main class="main">
  <div class="page-title">My Attempts</div>
  <div class="page-sub">All your quiz attempts in one place</div>

  <div class="stats-row">
    <div class="stat-card pink"><div class="stat-icon">Total</div><div class="stat-val" id="statTotal">—</div><div class="stat-lbl">Attempts</div></div>
    <div class="stat-card green"><div class="stat-icon">Passed</div><div class="stat-val" id="statPassed">—</div><div class="stat-lbl">Quizzes Passed</div></div>
    <div class="stat-card blue"><div class="stat-icon">Avg</div><div class="stat-val" id="statAvg">—</div><div class="stat-lbl">Average Score</div></div>
    <div class="stat-card yellow"><div class="stat-icon">Best</div><div class="stat-val" id="statBest">—</div><div class="stat-lbl">Best Score</div></div>
  </div>

  <div class="section-card">
    <div class="section-header">
      <span class="section-title">Attempt History</span>
    </div>
    <div class="attempts-list" id="attemptsList">
      <div style="color:var(--muted);text-align:center;padding:30px;font-size:14px">Loading...</div>
    </div>
  </div>
</main>

<script>
  const API = 'http://localhost:5000/api';
  const token = localStorage.getItem('token');
  if (!token) window.location.href = 'auth.html';
  function authHeaders() { return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }; }
  function logout() { localStorage.removeItem('token'); localStorage.removeItem('role'); window.location.href = 'auth.html'; }
  function getInitials(name) { return (name||'?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase(); }
  const avatarColors = ['#e8789a','#6aaee8','#f5c842','#7ec87e','#b888e0'];
  function avatarColor(name) { return avatarColors[(name||'').charCodeAt(0) % avatarColors.length]; }

  async function loadUser() {
    try {
      const res = await fetch(`${API}/auth/me`, { headers: authHeaders() });
      if (!res.ok) { logout(); return; }
      const data = await res.json();
      const user = data.user || data.data || data;
      document.getElementById('sidebarName').textContent = user.name || 'Student';
      document.getElementById('sidebarRole').textContent = user.role || 'student';
      document.getElementById('sidebarAvatar').textContent = getInitials(user.name);
      document.getElementById('sidebarAvatar').style.background = avatarColor(user.name);
      if (user.role === 'admin') {
        document.getElementById('adminNav').style.display = 'flex';
        document.getElementById('adminNavLabel').style.display = 'block';
      }
    } catch(e) { logout(); }
  }

  async function loadAttempts() {
    try {
      const res = await fetch(`${API}/attempts/my`, { headers: authHeaders() });
      const data = await res.json();
      // attempts route returns { success, count, attempts }
      const attempts = data.attempts || data.data || (Array.isArray(data) ? data : []);
      renderAttempts(attempts);
      computeStats(attempts);
    } catch(e) {
      document.getElementById('attemptsList').innerHTML = '<div style="color:var(--muted);text-align:center;padding:30px;font-size:14px">Could not load attempts</div>';
    }
  }

  function computeStats(attempts) {
    document.getElementById('statTotal').textContent = attempts.length;
    const passed = attempts.filter(a => a.passed).length;
    document.getElementById('statPassed').textContent = passed;
    const scores = attempts.map(a => a.percentageScore ?? a.score ?? 0);
    const avg = scores.length ? scores.reduce((s,x) => s+x, 0) / scores.length : 0;
    document.getElementById('statAvg').textContent = avg.toFixed(0) + '%';
    const best = scores.length ? Math.max(...scores) : 0;
    document.getElementById('statBest').textContent = best.toFixed(0) + '%';
  }

  function renderAttempts(attempts) {
    const el = document.getElementById('attemptsList');
    if (!attempts.length) {
      el.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📝</div>
          <div class="empty-text">No attempts yet! Take your first quiz.</div>
          <button class="btn-browse" onclick="window.location.href='quizzes.html'">Browse Quizzes</button>
        </div>`;
      return;
    }

    el.innerHTML = attempts.map((a, i) => {
      const title = a.quizId?.title || 'Quiz';
      const category = a.quizId?.category || '';
      const difficulty = a.quizId?.difficulty || '';
      const score = a.percentageScore ?? a.score ?? 0;
      const passed = a.passed ?? false;
      const marks = a.totalMarksAwarded ?? '—';
      const totalMarks = a.totalMarksPossible ?? '—';
      const date = a.submittedAt
        ? new Date(a.submittedAt).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' })
        : '—';
      const timeTaken = a.timeTakenSeconds
        ? (a.timeTakenSeconds >= 60 ? `${Math.floor(a.timeTakenSeconds/60)}m ${a.timeTakenSeconds%60}s` : `${a.timeTakenSeconds}s`)
        : '—';

      return `
        <div class="attempt-card" style="animation-delay:${i*0.05}s">
          <div class="attempt-result-badge ${passed ? 'badge-pass' : 'badge-fail'}">
            ${passed ? 'PASS' : 'FAIL'}
          </div>
          <div class="attempt-info">
            <div class="attempt-title">${title}</div>
            <div class="attempt-meta">
              <span class="meta-item">${category}</span>
              ${difficulty ? `<span class="diff-pill diff-${difficulty}">${difficulty}</span>` : ''}
              <span class="meta-item">Marks: ${marks}/${totalMarks}</span>
              <span class="meta-item">Time: ${timeTaken}</span>
              <span class="meta-item">${date}</span>
            </div>
          </div>
          <div class="attempt-score-wrap">
            <div class="attempt-score ${passed ? 'score-pass' : 'score-fail'}">${score.toFixed(0)}%</div>
            <div class="attempt-score-lbl">${passed ? 'Passed' : 'Failed'}</div>
          </div>
        </div>`;
    }).join('');
  }

  loadUser();
  loadAttempts();
</script>
</body>
</html>
