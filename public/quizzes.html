<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QuizArena — Browse Quizzes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #fdf6f0; --pink: #f7c5d5; --pink-deep: #e8789a; --pink-text: #8b3a5a;
    --yellow: #fde99d; --yellow-deep: #f5c842; --yellow-text: #7a5c00;
    --blue: #c2dff6; --blue-deep: #6aaee8; --blue-text: #1a4f7a;
    --card: #fffbf8; --border: rgba(0,0,0,0.07); --text: #2c1f2e; --muted: #9b8fa0;
    --sidebar-w: 240px;
  }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }
  .blob { position: fixed; border-radius: 50%; z-index: 0; pointer-events: none; filter: blur(70px); animation: drift 14s ease-in-out infinite; }
  .blob-1 { width: 400px; height: 400px; background: var(--pink); opacity: 0.25; top: -150px; right: -100px; }
  .blob-2 { width: 300px; height: 300px; background: var(--yellow); opacity: 0.3; bottom: -80px; left: 260px; animation-delay: -5s; }
  .blob-3 { width: 250px; height: 250px; background: var(--blue); opacity: 0.25; top: 50%; right: 10%; animation-delay: -3s; }
  @keyframes drift { 0%,100% { transform: translate(0,0); } 50% { transform: translate(12px,-16px); } }
 
  .sidebar { width: var(--sidebar-w); background: var(--card); border-right: 1.5px solid var(--border); display: flex; flex-direction: column; padding: 28px 16px; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 36px; padding: 0 8px; }
  .logo-icon { width: 38px; height: 38px; background: var(--pink-deep); border-radius: 11px; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-weight: 800; font-size: 18px; color: #fff; box-shadow: 0 3px 14px rgba(232,120,154,0.35); }
  .logo-text { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 18px; color: var(--pink-text); }
  .nav-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; padding: 0 12px; margin-bottom: 8px; margin-top: 20px; }
  .nav-item { display: flex; align-items: center; gap: 11px; padding: 11px 12px; border-radius: 12px; font-size: 14px; font-weight: 500; color: var(--muted); cursor: pointer; text-decoration: none; transition: background 0.2s, color 0.2s; margin-bottom: 3px; }
  .nav-item:hover { background: var(--pink); color: var(--pink-text); }
  .nav-item.active { background: var(--pink); color: var(--pink-text); font-weight: 600; }
  .nav-item .icon { font-size: 17px; width: 20px; text-align: center; }
  .sidebar-footer { margin-top: auto; padding: 0 8px; }
  .user-card { display: flex; align-items: center; gap: 10px; padding: 12px; background: var(--pink); border-radius: 14px; }
  .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--pink-deep); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: #fff; flex-shrink: 0; }
  .user-name { font-size: 13px; font-weight: 600; color: var(--pink-text); }
  .user-role { font-size: 11px; color: var(--pink-text); opacity: 0.7; }
  .logout-btn { margin-left: auto; background: none; border: none; cursor: pointer; font-size: 16px; opacity: 0.5; transition: opacity 0.2s; }
  .logout-btn:hover { opacity: 1; }
 
  .main { margin-left: var(--sidebar-w); flex: 1; padding: 36px 40px; position: relative; z-index: 1; animation: fadeIn 0.6s ease both; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
 
  .page-header { margin-bottom: 28px; }
  .page-title { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 800; color: var(--text); letter-spacing: -0.8px; }
  .page-sub { font-size: 15px; color: var(--muted); margin-top: 6px; }
 
  .filters { display: flex; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; }
  .filter-btn { padding: 9px 18px; border-radius: 100px; font-size: 13px; font-weight: 600; border: 1.5px solid var(--border); background: var(--card); color: var(--muted); cursor: pointer; transition: all 0.2s; }
  .filter-btn:hover { border-color: var(--pink-deep); color: var(--pink-text); }
  .filter-btn.active { background: var(--pink); border-color: var(--pink-deep); color: var(--pink-text); }
  .search-box { flex: 1; max-width: 300px; position: relative; }
  .search-box input { width: 100%; padding: 9px 16px 9px 38px; border-radius: 100px; border: 1.5px solid var(--border); background: var(--card); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; color: var(--text); outline: none; transition: border-color 0.2s; }
  .search-box input:focus { border-color: var(--pink-deep); }
  .search-box input::placeholder { color: var(--muted); }
  .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; }
 
  .quiz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
  .quiz-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 22px; padding: 24px; cursor: pointer; transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s; text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 14px; animation: popIn 0.5s cubic-bezier(0.16,1,0.3,1) both; position: relative; overflow: hidden; }
  .quiz-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(232,120,154,0.15); border-color: var(--pink-deep); }
  @keyframes popIn { from { opacity: 0; transform: scale(0.94); } to { opacity: 1; transform: scale(1); } }
  .quiz-card-blob { position: absolute; top: -40px; right: -40px; width: 120px; height: 120px; border-radius: 50%; opacity: 0.15; pointer-events: none; }
  .quiz-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .quiz-emoji { font-size: 36px; }
  .diff-badge { padding: 5px 12px; border-radius: 100px; font-size: 12px; font-weight: 600; }
  .diff-Easy { background: #d4f0e8; color: #2d7a5f; }
  .diff-Medium { background: var(--yellow); color: var(--yellow-text); }
  .diff-Hard { background: #fdd5d5; color: #a03030; }
  .quiz-card-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; line-height: 1.3; }
  .quiz-card-cat { font-size: 13px; color: var(--muted); }
  .quiz-card-stats { display: flex; gap: 16px; }
  .quiz-stat { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--muted); }
  .quiz-stat span { font-weight: 600; color: var(--text); }
  .quiz-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
  .start-btn { padding: 10px 20px; background: var(--pink-deep); color: #fff; border: none; border-radius: 100px; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 3px 14px rgba(232,120,154,0.3); }
  .start-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 20px rgba(232,120,154,0.4); }
  .attempts-label { font-size: 12px; color: var(--muted); }
 
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .emoji { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 16px; }
 
  @media (max-width: 650px) { .sidebar { display: none; } .main { margin-left: 0; padding: 24px 16px; } }
</style>
</head>
<body>
<div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div>
 
<aside class="sidebar">
  <div class="logo"><div class="logo-icon">Q</div><span class="logo-text">QuizArena</span></div>
  <span class="nav-label">Menu</span>
  <a class="nav-item" href="dashboard.html"><span class="icon">🏠</span> Dashboard</a>
  <a class="nav-item active" href="quizzes.html"><span class="icon">📋</span> Browse Quizzes</a>
  <a class="nav-item" href="attempts.html"><span class="icon">📝</span> My Attempts</a>
  <a class="nav-item" href="leaderboard.html"><span class="icon">🏆</span> Leaderboard</a>
  <span class="nav-label" id="adminNavLabel" style="display:none">Admin</span>
  <a class="nav-item" id="adminNav" href="admin.html" style="display:none"><span class="icon">⚙️</span> Manage Quizzes</a>
  <div class="sidebar-footer">
    <div class="user-card">
      <div class="user-avatar" id="sidebarAvatar">?</div>
      <div><div class="user-name" id="sidebarName">Loading...</div><div class="user-role" id="sidebarRole">student</div></div>
      <button class="logout-btn" onclick="logout()">🚪</button>
    </div>
  </div>
</aside>
 
<main class="main">
  <div class="page-header">
    <div class="page-title">Browse Quizzes</div>
    <div class="page-sub">Pick a quiz and start competing!</div>
  </div>
  <div class="filters">
    <div class="search-box"><span class="search-icon">🔍</span><input type="text" id="searchInput" placeholder="Search quizzes..." oninput="filterQuizzes()"/></div>
    <!-- FIX: filter values match capitalized difficulty from DB -->
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('Easy', this)">Easy</button>
    <button class="filter-btn" onclick="setFilter('Medium', this)">Medium</button>
    <button class="filter-btn" onclick="setFilter('Hard', this)">Hard</button>
  </div>
  <div class="quiz-grid" id="quizGrid"><div class="empty-state"><div class="emoji">⏳</div><p>Loading quizzes...</p></div></div>
</main>
 
<script>
  const API = 'http://localhost:5000/api';
  const token = localStorage.getItem('token');
  if (!token) window.location.href = 'auth.html';
  function authHeaders() { return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }; }
  function logout() { localStorage.removeItem('token'); window.location.href = 'auth.html'; }
  function getInitials(name) { return (name||'?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase(); }
  const avatarColors = ['#e8789a','#6aaee8','#f5c842','#7ec87e','#b888e0'];
  function avatarColor(name) { return avatarColors[(name||'').charCodeAt(0) % avatarColors.length]; }
 
  let allQuizzes = [];
  let currentFilter = 'all';
  const emojis = ['🧠','📚','💡','🔬','🌍','🎨','🧬','📐','🏛️','🎭'];
  const blobColors = ['var(--pink-deep)','var(--yellow-deep)','var(--blue-deep)'];
 
  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderQuizzes();
  }
 
  function filterQuizzes() { renderQuizzes(); }
 
  function renderQuizzes() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    let list = allQuizzes.filter(q => {
      // FIX: case-insensitive difficulty comparison
      const matchDiff = currentFilter === 'all' || (q.difficulty||'').toLowerCase() === currentFilter.toLowerCase();
      const matchSearch = !search || q.title.toLowerCase().includes(search) || (q.category||'').toLowerCase().includes(search);
      return matchDiff && matchSearch;
    });
    const grid = document.getElementById('quizGrid');
    if (!list.length) { grid.innerHTML = '<div class="empty-state"><div class="emoji">🔍</div><p>No quizzes found</p></div>'; return; }
    grid.innerHTML = list.map((q, i) => `
      <div class="quiz-card" style="animation-delay:${i*0.07}s" onclick="window.location.href='quiz.html?id=${q._id}'">
        <div class="quiz-card-blob" style="background:${blobColors[i%3]}"></div>
        <div class="quiz-card-top">
          <div class="quiz-emoji">${emojis[i % emojis.length]}</div>
          <span class="diff-badge diff-${q.difficulty||'Medium'}">${q.difficulty||'Medium'}</span>
        </div>
        <div>
          <div class="quiz-card-title">${q.title}</div>
          <div class="quiz-card-cat">${q.category||'General'}</div>
        </div>
        <div class="quiz-card-stats">
          <div class="quiz-stat">❓ <span>${q.questions?.length||0}</span> questions</div>
          <div class="quiz-stat">⏱ <span>${q.timeLimitMinutes||10}</span> mins</div>
        </div>
        <div class="quiz-card-footer">
          <span class="attempts-label">${q.totalAttempts||0} attempts</span>
          <button class="start-btn" onclick="event.stopPropagation();window.location.href='quiz.html?id=${q._id}'">Start Quiz</button>
        </div>
      </div>`).join('');
  }
 
  async function loadUser() {
    try {
      const res = await fetch(`${API}/auth/me`, { headers: authHeaders() });
      if (!res.ok) { logout(); return; }
      const data = await res.json();
      // FIX: auth/me returns { success, user }
      const user = data.user || data.data || data;
      document.getElementById('sidebarName').textContent = user.name||'Student';
      document.getElementById('sidebarRole').textContent = user.role||'student';
      document.getElementById('sidebarAvatar').textContent = getInitials(user.name);
      document.getElementById('sidebarAvatar').style.background = avatarColor(user.name);
      if (user.role === 'admin') {
        document.getElementById('adminNav').style.display='flex';
        document.getElementById('adminNavLabel').style.display='block';
      }
    } catch(e) {}
  }
 
  async function loadQuizzes() {
    try {
      const res = await fetch(`${API}/quizzes`, { headers: authHeaders() });
      const data = await res.json();
      // FIX: API returns { success, count, quizzes }
      allQuizzes = data.quizzes || data.data || (Array.isArray(data) ? data : []);
      renderQuizzes();
    } catch(e) {
      document.getElementById('quizGrid').innerHTML = '<div class="empty-state"><div class="emoji">😕</div><p>Could not load quizzes</p></div>';
    }
  }
 
  loadUser();
  loadQuizzes();
</script>
</body>
</html>
